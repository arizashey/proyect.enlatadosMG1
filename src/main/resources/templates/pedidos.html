<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedidos - Enlatados MG</title>
    <link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>

<body id="page-top">
<div id="wrapper">

    <!-- Menú lateral -->
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion">
        <a class="sidebar-brand d-flex align-items-center justify-content-center" href="/index">
            <div class="sidebar-brand-text mx-3">Enlatados MG</div>
        </a>
        <hr class="sidebar-divider my-0">
        <li class="nav-item">
            <a class="nav-link" href="/index">
                <i class="fas fa-fw fa-tachometer-alt"></i>
                <span>Inicio</span>
            </a>
        </li>
        <hr class="sidebar-divider">
        <div class="sidebar-heading">Gestión</div>
        <li class="nav-item">
            <a class="nav-link" href="/clientes">
                <i class="fas fa-fw fa-users"></i>
                <span>Clientes</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/repartidores">
                <i class="fas fa-fw fa-truck"></i>
                <span>Repartidores</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/vehiculos">
                <i class="fas fa-fw fa-car"></i>
                <span>Vehículos</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/almacen">
                <i class="fas fa-fw fa-box"></i>
                <span>Almacén</span>
            </a>
        </li>
        <li class="nav-item active">
            <a class="nav-link" href="/pedidos">
                <i class="fas fa-fw fa-clipboard-list"></i>
                <span>Pedidos</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/carga">
                <i class="fas fa-fw fa-file-csv"></i>
                <span>Carga CSV</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/reportes">
                <i class="fas fa-fw fa-chart-bar"></i>
                <span>Reportes</span>
            </a>
        </li>
        <hr class="sidebar-divider">
        <li class="nav-item">
            <a class="nav-link" href="/">
                <i class="fas fa-fw fa-sign-out-alt"></i>
                <span>Cerrar Sesión</span>
            </a>
        </li>
    </ul>

    <!-- Contenido principal -->
    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">

            <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                <h4 class="ml-3 font-weight-bold text-primary mb-0">
                    <i class="fas fa-clipboard-list mr-2"></i>Gestión de Pedidos
                </h4>
            </nav>

            <div class="container-fluid">

                <!-- Mensaje de error -->
                <div th:if="${error}" class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span th:text="${error}"></span>
                </div>

                <!-- Formulario crear pedido -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">
                            Crear nuevo pedido
                        </h6>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/pedidos/crear}" method="post">
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Departamento Origen</label>
                                        <input type="text" class="form-control"
                                               name="origen" placeholder="Ej: Guatemala">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Departamento Destino</label>
                                        <input type="text" class="form-control"
                                               name="destino" placeholder="Ej: Quetzaltenango">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>CUI del Cliente</label>
                                        <input type="text" class="form-control"
                                               name="cuiCliente" placeholder="CUI del cliente">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>CUI del Repartidor</label>
                                        <input type="text" class="form-control"
                                               name="cuiRepartidor" placeholder="CUI del repartidor">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Placa del Vehículo</label>
                                        <input type="text" class="form-control"
                                               name="placaVehiculo" placeholder="Ej: 789RCV">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Número de Cajas</label>
                                        <input type="number" class="form-control"
                                               name="numeroCajas" placeholder="Ej: 10">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Fecha</label>
                                        <input type="date" class="form-control"
                                               name="fecha">
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Crear Pedido
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Tabla pedidos -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">
                            Lista de Pedidos
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered" width="100%">
                                <thead>
                                <tr>
                                    <th># Pedido</th>
                                    <th>Origen</th>
                                    <th>Destino</th>
                                    <th>Fecha</th>
                                    <th>Cajas</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="p : ${pedidos}">
                                    <td th:text="${p.numeroPedido}"></td>
                                    <td th:text="${p.departamentoOrigen}"></td>
                                    <td th:text="${p.departamentoDestino}"></td>
                                    <td th:text="${p.fechaHoraInicio}"></td>
                                    <td th:text="${p.numeroCajas}"></td>
                                    <td>
                                            <span th:if="${p.estado == 'PENDIENTE'}"
                                                  class="badge badge-warning">
                                                PENDIENTE
                                            </span>
                                        <span th:if="${p.estado == 'COMPLETADO'}"
                                              class="badge badge-success">
                                                COMPLETADO
                                            </span>
                                    </td>
                                    <td>
                                        <a th:href="@{/pedidos/{numero}(numero=${p.numeroPedido})}"
                                           class="btn btn-info btn-sm">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/pedidos/completar/{numero}(numero=${p.numeroPedido})}"
                                           th:if="${p.estado == 'PENDIENTE'}"
                                           class="btn btn-success btn-sm"
                                           onclick="return confirm('¿Completar pedido?')">
                                            <i class="fas fa-check"></i>
                                        </a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="/vendor/jquery/jquery.min.js"></script>
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/js/sb-admin-2.min.js"></script>
</body>
</html>
